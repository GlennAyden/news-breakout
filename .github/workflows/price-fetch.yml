# .github/workflows/price-fetch.yml
name: price-fetch
on:
  schedule:
    - cron: "*/30 2-9 * * 1-5"   # every 30 min, 02:00-09:00 UTC = 09:00-16:00 WIB, Mon-Fri
    - cron: "0 3 * * 6"          # Sat 10:00 WIB — refresh 1d bars for the weekend deep-scan
  workflow_dispatch:
    inputs:
      mode:
        description: "intraday (1d+60m, watchlist∪candidates) or daily (1d, broad)"
        required: false
        default: intraday
concurrency:
  group: price-fetch
  cancel-in-progress: true
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance==0.2.66 httpx==0.27.2 pandas==2.2.3 pyyaml==6.0.2
      - name: Fetch prices to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/fetch_to_supabase.py --mode "${{ github.event.inputs.mode || 'intraday' }}"
  price-fetch-ajaib:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.inputs.mode == 'daily' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet yfinance==0.2.66 httpx==0.27.2 pandas==2.2.3 pyyaml==6.0.2
      - name: Fetch Ajaib prices to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/fetch_to_supabase.py --source ajaib --mode daily
