  # after market_open + this many minutes (skips the morning warm-up), and the value is
  # kept above the IDX 12:00–13:30 lunch gap so a normal session never false-alarms.
  price_staleness_max_minutes: 150

news:
  curated_keywords:
    - dividen
    - rights issue
    - hmetd
    - private placement
    - buyback
    - pembelian kembali
    - akuisisi
    - divestasi
    - merger
    - penggabungan
    - rups
    - laporan keuangan
    - fakta material
    - kontrak
    - obligasi
    - stock split
    - pemegang saham
  disclosure_page_size: 50
  news_poll_interval_minutes: 60
  booster_window_hours: 48
  priority_boost: 3.0

portal:
  enabled: true           # ticker-matched market news -> News channel
  sources:                # VPS-reachable feeds only (Kontan RSS + Bisnis/Investor HTML dropped: 403 from the datacenter IP)
    - {url: https://www.cnbcindonesia.com/market/rss, parser: rss}
    - {url: https://www.antaranews.com/rss/ekonomi.xml, parser: rss}
    - {url: https://www.idxchannel.com/rss, parser: rss}
    - {url: https://katadata.co.id/rss/finansial, parser: rss}
    - {url: https://emitentrust.com/category/stock-and-market/feed/, parser: rss}
    - {url: https://emitennews.com/category/emiten, parser: emitennews}
  summary_sentences: 2    # extractive lead length (sentences)
  max_per_run: 20         # anti-flood cap: max NEW items sent per hourly run
  name_map:               # lowercase company name -> ticker; extend/verify for your watchlist
