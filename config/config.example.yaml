# Non-secret configuration. Copy to config/config.yaml and edit.
watchlist:
  - ANTM
  - ARCI
  - BREN
  - BRMS
  - BRPT
  - BUMI
  - BUVA
  - CUAN
  - DEWA
  - DSSA
  - ENRG
  - HRUM
  - IMPC
  - MEDC
  - MINA
  - PANI
  - PTRO
  - RATU
  - RAJA
  - TINS
  - TOBA
  - TPIA
  - VKTR
  - WIFI

signals:
  donchian_lookback: 20
  rvol_threshold: 2.0
  rvol_window: 20
  range_lookback: 30
  range_max_width_pct: 0.15

data:
  history_days: 120
  intraday_period_days: 60

runtime:
  dry_run: true   # true = log alerts instead of sending to Telegram

schedule:
  market_open: "09:00"
  market_close: "16:00"
  scan_interval_minutes: 30
  weekend_scan_day: "sat"
  holidays: []   # IDX holiday dates as "YYYY-MM-DD"; fill these in yearly

universe:
  candidates: []            # tickers to consider beyond the watchlist (populated later)
  min_price: 50
  min_daily_value: 1000000000   # Rp 1 billion avg daily transaction value

news:
  curated_keywords:
    - dividen
    - rights issue
    - hmetd
    - private placement
    - buyback
    - pembelian kembali
    - akuisisi
    - divestasi
    - merger
    - penggabungan
    - rups
    - laporan keuangan
    - fakta material
    - kontrak
    - obligasi
    - stock split
    - pemegang saham
  disclosure_page_size: 50
  news_poll_interval_minutes: 60
  booster_window_hours: 48
  priority_boost: 3.0

portal:
  enabled: false          # opt-in; enable after adding sources + tuning name_map
  sources: []             # RSS feed URLs, e.g. https://www.kontan.co.id/rss
  name_map: {}            # lowercase company name -> ticker, e.g. {barito pacific: BRPT, aneka tambang: ANTM}
