  - RATU
  - RAJA
  - TINS
  - TOBA
  - TPIA
  - VKTR
  - WIFI

signals:
  donchian_lookback: 20
  rvol_threshold: 2.5   # raised 2.0->2.5 per 5y backtest: higher RVOL -> better forward returns, ~20% fewer/more-selective alerts
  rvol_window: 20
  range_lookback: 30
  range_max_width_pct: 0.15

data:
  history_days: 120
  intraday_period_days: 60

runtime:
  dry_run: true   # true = log alerts instead of sending to Telegram

schedule:
  market_open: "09:00"
  market_close: "16:00"
  scan_interval_minutes: 30
  weekend_scan_day: "sat"
  holidays: []   # IDX holiday dates as "YYYY-MM-DD"; fill these in yearly

universe:
  # Liquid IDX universe scanned IN ADDITION to the watchlist (LQ45/IDX80 + other
  # high-transaction-value names). These are filtered live by min_price +
