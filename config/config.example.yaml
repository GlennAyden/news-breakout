signals:
  donchian_lookback: 20
  rvol_threshold: 2.5   # raised 2.0->2.5 per 5y backtest: higher RVOL -> better forward returns, ~20% fewer/more-selective alerts
  rvol_window: 20
  range_lookback: 30
  range_max_width_pct: 0.15

data:
  history_days: 120
  intraday_period_days: 60

runtime:
  dry_run: true   # true = log alerts instead of sending to Telegram

schedule:
  market_open: "09:00"
  market_close: "16:00"
  scan_interval_minutes: 30
  weekend_scan_day: "sat"
  # IDX 2026 trading-holiday calendar (source: IDX announcement Peng-00171/BEI.POP/09-2025,
  # 23-Sep-2025, "Kalender Libur Bursa Tahun 2026", as republished/corroborated by KSEI
  # announcement PENG-0005/DIR/KSEI/1025 and independently by Fortune Indonesia's 2026
  # exchange-holiday calendar article; both sources match exactly on all 22 dates below).
  holidays:
    - "2026-01-01"   # Tahun Baru 2026 Masehi (New Year's Day)
    - "2026-01-16"   # Isra Mikraj Nabi Muhammad SAW
    - "2026-02-16"   # Cuti Bersama Tahun Baru Imlek 2577 Kongzili (joint leave, Lunar New Year)
    - "2026-02-17"   # Tahun Baru Imlek 2577 Kongzili (Lunar New Year)
    - "2026-03-18"   # Cuti Bersama Hari Suci Nyepi Tahun Baru Saka 1948 (joint leave, Nyepi)
    - "2026-03-19"   # Hari Suci Nyepi Tahun Baru Saka 1948 (Nyepi / Day of Silence)
    - "2026-03-20"   # Cuti Bersama Idul Fitri 1447 H (joint leave; Idul Fitri itself falls Sat-Sun 21-22 Mar)
    - "2026-03-23"   # Cuti Bersama Idul Fitri 1447 H (joint leave)
    - "2026-03-24"   # Cuti Bersama Idul Fitri 1447 H (joint leave)
    - "2026-04-03"   # Wafat Yesus Kristus (Good Friday)
    - "2026-05-01"   # Hari Buruh Internasional (International Labour Day)
    - "2026-05-14"   # Kenaikan Yesus Kristus (Ascension Day)
    - "2026-05-15"   # Cuti Bersama Kenaikan Yesus Kristus (joint leave)
    - "2026-05-27"   # Idul Adha 1447 H
    - "2026-05-28"   # Cuti Bersama Hari Raya Idul Adha 1447 H (joint leave)
    - "2026-06-01"   # Hari Lahir Pancasila (Pancasila Day)
    - "2026-06-16"   # 1 Muharam Tahun Baru Islam 1448 H (Islamic New Year)
    - "2026-08-17"   # Proklamasi Kemerdekaan (Independence Day)
    - "2026-08-25"   # Maulid Nabi Muhammad SAW (Prophet Muhammad's Birthday)
    - "2026-12-24"   # Cuti Bersama Kelahiran Yesus Kristus (joint leave, Christmas)
    - "2026-12-25"   # Kelahiran Yesus Kristus (Christmas Day)
    - "2026-12-31"   # Libur Bursa (IDX-specific year-end exchange closure, not a national holiday)

