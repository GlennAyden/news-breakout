# Non-secret configuration. Copy to config/config.yaml and edit.
watchlist:
  - ANTM
  - ARCI
  - BREN
  - BRMS
  - BRPT
  - BUMI
  - BUVA
  - CUAN
  - DEWA
  - DSSA
  - ENRG
  - HRUM
  - IMPC
  - MEDC
  - MINA
  - PANI
  - PTRO
  - RATU
  - RAJA
  - TINS
  - TOBA
  - TPIA
  - VKTR
  - WIFI

signals:
  donchian_lookback: 20
  rvol_threshold: 2.0
  rvol_window: 20
  range_lookback: 30
  range_max_width_pct: 0.15

data:
  history_days: 120
  intraday_period_days: 60

runtime:
  dry_run: true   # true = log alerts instead of sending to Telegram

schedule:
  market_open: "09:00"
  market_close: "16:00"
  scan_interval_minutes: 30
  weekend_scan_day: "sat"
  holidays: []   # IDX holiday dates as "YYYY-MM-DD"; fill these in yearly

universe:
  candidates: []            # tickers to consider beyond the watchlist (populated later)
  min_price: 50
  min_daily_value: 1000000000   # Rp 1 billion avg daily transaction value

news:
  curated_keywords:
    - dividen
    - rights issue
    - hmetd
    - private placement
    - buyback
    - pembelian kembali
    - akuisisi
    - divestasi
    - merger
    - penggabungan
    - rups
    - laporan keuangan
    - fakta material
    - kontrak
    - obligasi
    - stock split
    - pemegang saham
  disclosure_page_size: 50
  news_poll_interval_minutes: 60
  booster_window_hours: 48
  priority_boost: 3.0

portal:
  enabled: false          # opt-in; set true after reviewing sources + name_map
  sources:                # market-news feeds: RSS + HTML scrapers (adapted from NexaQuant)
    - {url: https://www.cnbcindonesia.com/market/rss, parser: rss}
    - {url: https://www.antaranews.com/rss/ekonomi.xml, parser: rss}
    - {url: https://www.idxchannel.com/rss, parser: rss}
    - {url: https://investasi.kontan.co.id/rss, parser: rss}
    - {url: https://katadata.co.id/rss/finansial, parser: rss}
    - {url: https://emitentrust.com/category/stock-and-market/feed/, parser: rss}
    - {url: https://emitennews.com/category/emiten, parser: emitennews}
    - {url: https://market.bisnis.com/bursa-saham, parser: bisnis}
    - {url: https://investor.id/market/corporate-action, parser: investor}
  name_map:               # lowercase company name -> ticker; extend/verify for your watchlist
    aneka tambang: ANTM
    antam: ANTM
    barito renewables: BREN
    bumi resources minerals: BRMS
    barito pacific: BRPT
    bumi resources: BUMI
    petrindo jaya: CUAN
    darma henwa: DEWA
    dian swastatika: DSSA
    energi mega persada: ENRG
    harum energy: HRUM
    impack: IMPC
    medco: MEDC
    pantai indah kapuk: PANI
    petrosea: PTRO
    rukun raharja: RAJA
    timah: TINS
    chandra asri: TPIA
